<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DUFAN — Masuk / Daftar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎢</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="css/auth.css" rel="stylesheet"/>
</head>
<body>

<!-- Animated canvas background (left panel) -->
<canvas id="hero-canvas"></canvas>

<!-- Back button -->
<a href="index.html" class="back-btn">
  <span class="back-arrow">←</span>
  <span class="back-label">Kembali</span>
</a>

<div class="stage">

  <!-- ══ AUTH PANEL ══ -->
  <div class="auth-wrap">
    <div class="auth-card" id="authCard">

      <!-- Decorative circles -->
      <div class="card-circle card-circle--1"></div>
      <div class="card-circle card-circle--2"></div>

      <!-- Tabs -->
      <div class="tab-row">
        <div class="tab-slider" id="tab-slider"></div>
        <button class="tab-btn active" id="tb-login" onclick="gotoTab('login')">Masuk</button>
        <button class="tab-btn" id="tb-reg" onclick="gotoTab('register')">Daftar</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="pane-login" class="form-panel">
        <div class="card-title">Hai, Selamat Datang! 👋</div>
        <div class="card-sub">Masuk ke akun DUFAN kamu</div>

        <div class="field">
          <div class="fl">Email <span class="req">*</span></div>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input class="fi" id="l-email" type="email" placeholder="email@contoh.com" autocomplete="email"/>
          </div>
          <div class="ferr" id="le-email"></div>
        </div>

        <div class="field">
          <div class="fl">Password <span class="req">*</span></div>
          <div class="input-wrap pw-wrap">
            <span class="input-icon">🔒</span>
            <input class="fi" id="l-pw" type="password" placeholder="Password kamu" autocomplete="current-password"/>
            <button class="pw-eye" onclick="togglePw('l-pw',this)" tabindex="-1">👁</button>
          </div>
          <div class="ferr" id="le-pw"></div>
        </div>

        <a class="forgot-link" onclick="doForgot()">Lupa password?</a>

        <button class="btn-submit" id="btn-login" onclick="doLogin()">
          <span class="btn-text">🎢 Masuk Sekarang</span>
          <span class="btn-shine"></span>
        </button>

        <div class="auth-switch">
          Belum punya akun?
          <span onclick="gotoTab('register')">Daftar gratis →</span>
        </div>
      </div>

      <!-- ── REGISTER ── -->
      <div id="pane-reg" class="form-panel hidden">
        <div class="card-title">Buat akun baru 🎉</div>
        <div class="card-sub">Satu akun untuk semua wahana</div>

        <div class="field">
          <div class="fl">Nama Lengkap <span class="req">*</span></div>
          <div class="input-wrap">
            <span class="input-icon">😊</span>
            <input class="fi" id="r-name" type="text" placeholder="Nama lengkap kamu"/>
          </div>
          <div class="ferr" id="re-name"></div>
        </div>

        <div class="field-row col2">
          <div>
            <div class="fl">Email <span class="req">*</span></div>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input class="fi" id="r-email" type="email" placeholder="email@contoh.com"/>
            </div>
            <div class="ferr" id="re-email"></div>
          </div>
          <div>
            <div class="fl">No. HP <span class="req">*</span></div>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input class="fi" id="r-phone" type="tel" placeholder="08xx-xxxx-xxxx"/>
            </div>
            <div class="ferr" id="re-phone"></div>
          </div>
        </div>

        <div class="field-row col2">
          <div>
            <div class="fl">Password <span class="req">*</span></div>
            <div class="input-wrap pw-wrap">
              <span class="input-icon">🔒</span>
              <input class="fi" id="r-pw" type="password" placeholder="Min. 6 karakter"/>
              <button class="pw-eye" onclick="togglePw('r-pw',this)" tabindex="-1">👁</button>
            </div>
            <div class="ferr" id="re-pw"></div>
          </div>
          <div>
            <div class="fl">Konfirmasi <span class="req">*</span></div>
            <div class="input-wrap pw-wrap">
              <span class="input-icon">🔐</span>
              <input class="fi" id="r-conf" type="password" placeholder="Ulangi password"/>
              <button class="pw-eye" onclick="togglePw('r-conf',this)" tabindex="-1">👁</button>
            </div>
            <div class="ferr" id="re-conf"></div>
          </div>
        </div>

        <button class="btn-submit" id="btn-reg" onclick="doRegister()">
          <span class="btn-text">🎟️ Buat Akun Gratis</span>
          <span class="btn-shine"></span>
        </button>

        <div class="auth-switch">
          Sudah punya akun?
          <span onclick="gotoTab('login')">Masuk →</span>
        </div>
      </div>

    </div>
  </div>

</div><!-- /stage -->

<div class="toast" id="toast"><span id="t-icon"></span><span id="t-msg"></span></div>

<script>
/* ── Tab switching ── */
function gotoTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('pane-login').classList.toggle('hidden', !isLogin);
  document.getElementById('pane-reg').classList.toggle('hidden', isLogin);
  document.getElementById('tb-login').classList.toggle('active', isLogin);
  document.getElementById('tb-reg').classList.toggle('active', !isLogin);
  document.getElementById('tab-slider').classList.toggle('right', !isLogin);
  // Bounce card
  const card = document.getElementById('authCard');
  card.classList.remove('tab-bounce');
  void card.offsetWidth;
  card.classList.add('tab-bounce');
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

/* ── Hero Canvas: mini park scene ── */
(function() {
  const canvas = document.getElementById('hero-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, frame = 0;
  let fwRot = 0, carRot = 0, cartT = 0;
  const dpr = () => Math.min(window.devicePixelRatio || 1, 2);

  const FW_COLORS = ['#FF6B2B','#FFD60A','#FF4785','#00B4FF','#22C55E','#9B5DE5','#FF8F5E','#FFE55A','#FF6B2B','#00B4FF'];

  function resize() {
    const d = dpr();
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * d; canvas.height = H * d;
    ctx.setTransform(d, 0, 0, d, 0, 0);
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath(); c.moveTo(x+r,y);
    c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
  }

  function drawFerrisWheel() {
    const fx = W * 0.52, fy = H * 0.44, R = Math.min(W * 0.22, H * 0.30, 160);
    ctx.save(); ctx.translate(fx, fy);
    // glow
    const g = ctx.createRadialGradient(0,0,R*.2,0,0,R*1.4);
    g.addColorStop(0,'rgba(255,107,43,.12)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(-R*1.5,-R*1.5,R*3,R*3);
    // outer rim
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,107,43,.7)'; ctx.lineWidth=4;
    ctx.shadowColor='#FF6B2B'; ctx.shadowBlur=12; ctx.stroke(); ctx.shadowBlur=0;
    // inner ring
    ctx.beginPath(); ctx.arc(0,0,R*.3,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,107,43,.3)'; ctx.lineWidth=2.5; ctx.stroke();
    // spokes
    for(let i=0;i<10;i++){
      const a=fwRot+(i/10)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*R*.3,Math.sin(a)*R*.3);
      ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R);
      ctx.strokeStyle='rgba(255,107,43,.25)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    // gondolas
    for(let i=0;i<10;i++){
      const a=fwRot+(i/10)*Math.PI*2;
      const ax=Math.cos(a)*R, ay=Math.sin(a)*R;
      const cW=R*.14, cH=R*.11, hang=R*.065;
      const col=FW_COLORS[i];
      ctx.save(); ctx.translate(ax,ay);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,hang);
      ctx.strokeStyle='rgba(80,40,0,.4)'; ctx.lineWidth=1.5; ctx.stroke();
      roundRect(ctx,-cW/2,hang,cW,cH,4);
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=6; ctx.fill(); ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.arc(0,hang+cH*.45,cW*.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(ax,ay,4,0,Math.PI*2);
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
    }
    // hub
    ctx.beginPath(); ctx.arc(0,0,R*.06,0,Math.PI*2);
    ctx.fillStyle='#CC4A15'; ctx.shadowColor='#FF6B2B'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    // legs
    ctx.lineWidth=6; ctx.strokeStyle='#CC4A15'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(-R*.25,R); ctx.lineTo(0,R*.06); ctx.lineTo(R*.25,R); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-R*.45,R); ctx.lineTo(R*.45,R); ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
    ctx.restore();
  }

  function drawRC() {
    const pts=[];
    for(let i=0;i<=100;i++){
      const t=i/100, x=t*W, base=H*.88;
      let y=base - Math.sin(t*Math.PI*2)*H*.04;
      if(t>.15&&t<.3) y-=Math.sin((t-.15)/.15*Math.PI)*H*.18;
      if(t>.5&&t<.65) y-=Math.sin((t-.5)/.15*Math.PI)*H*.12;
      if(t>.75&&t<.85) y-=Math.sin((t-.75)/.1*Math.PI)*H*.07;
      pts.push([x,y]);
    }
    // support pillars
    ctx.strokeStyle='rgba(204,74,21,.2)'; ctx.lineWidth=2.5;
    pts.forEach(([x,y],i)=>{ if(i%15===0){ ctx.beginPath(); ctx.moveTo(x,y+4); ctx.lineTo(x,H*.9); ctx.stroke(); }});
    // shadow track
    ctx.beginPath(); pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y+3):ctx.lineTo(x,y+3));
    ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.lineWidth=6; ctx.stroke();
    // lower rail
    ctx.beginPath(); pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.strokeStyle='rgba(204,74,21,.6)'; ctx.lineWidth=4; ctx.stroke();
    // upper rail
    ctx.beginPath(); pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y-7):ctx.lineTo(x,y-7));
    ctx.strokeStyle='rgba(255,107,43,.5)'; ctx.lineWidth=2.5; ctx.stroke();
    // ties
    ctx.strokeStyle='rgba(204,74,21,.3)'; ctx.lineWidth=2;
    pts.forEach(([x,y],i)=>{ if(i%5===0){ ctx.beginPath(); ctx.moveTo(x,y-7); ctx.lineTo(x,y+2); ctx.stroke(); }});
    // cart
    cartT=(cartT+.003)%1;
    const ci=Math.floor(cartT*(pts.length-2));
    const [cx2,cy2]=pts[ci], [nx,ny]=pts[ci+1];
    const ang=Math.atan2(ny-cy2,nx-cx2);
    ctx.save(); ctx.translate(cx2,cy2-9); ctx.rotate(ang);
    roundRect(ctx,-20,-11,40,16,5); ctx.fillStyle='#FF4785'; ctx.fill();
    ctx.fillStyle='#FFD60A'; ctx.fillRect(-20,-11,6,16);
    [-10,10].forEach(wx=>{
      ctx.beginPath(); ctx.arc(wx,6,5,0,Math.PI*2);
      ctx.fillStyle='#1E1040'; ctx.fill();
      ctx.beginPath(); ctx.arc(wx,6,2,0,Math.PI*2);
      ctx.fillStyle='#FF6B2B'; ctx.fill();
    });
    ['#FFD60A','#FF4785','#00B4FF'].forEach((c,pi)=>{
      ctx.beginPath(); ctx.arc(-7+pi*7,-15,4.5,Math.PI,0);
      ctx.fillStyle=c; ctx.fill();
    });
    ctx.restore();
  }

  function drawBalloon() {
    const bR=Math.min(W*.07,60);
    const bX=W*.12, bY=H*.25+Math.sin(frame*.008)*12;
    const cols=['#FF6B2B','#FFD60A','#FF4785','#22C55E','#00B4FF','#9B5DE5'];
    ctx.save(); ctx.translate(bX,bY);
    ctx.save();
    ctx.beginPath(); ctx.ellipse(0,0,bR,bR*1.25,0,0,Math.PI*2); ctx.clip();
    cols.forEach((c,i)=>{
      const x=-bR+(i/6)*bR*2, x2=-bR+((i+1)/6)*bR*2;
      ctx.fillStyle=c; ctx.fillRect(x,-bR*1.3,x2-x,bR*2.6);
    });
    ctx.restore();
    ctx.beginPath(); ctx.ellipse(0,0,bR,bR*1.25,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(-bR*.25,-bR*.3,bR*.25,bR*.35,-.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fill();
    const ropeTop=bR*1.25, baskW=bR*.5, baskH=bR*.35, baskTop=ropeTop+bR*.45;
    ctx.strokeStyle='rgba(100,60,0,.45)'; ctx.lineWidth=1.5;
    [[-baskW*.4,ropeTop],[baskW*.4,ropeTop]].forEach(([px,py])=>{
      ctx.beginPath(); ctx.moveTo(-baskW*.45,baskTop); ctx.lineTo(px,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(baskW*.45,baskTop); ctx.lineTo(px,py); ctx.stroke();
    });
    roundRect(ctx,-baskW/2,baskTop,baskW,baskH,4);
    ctx.fillStyle='#8B6914'; ctx.fill();
    ctx.restore();
  }

  // Fairy lights
  const LIGHT_COLS=['#FF6B2B','#FFD60A','#FF4785','#00B4FF','#22C55E','#9B5DE5'];
  function drawLights() {
    const n=20;
    ctx.beginPath();
    for(let i=0;i<=60;i++){const t=i/60;ctx.lineTo(t*W,H*.06+Math.sin(t*Math.PI)*H*.025);}
    ctx.strokeStyle='rgba(100,60,0,.15)'; ctx.lineWidth=1; ctx.stroke();
    for(let i=0;i<n;i++){
      const t=i/(n-1), x=t*W, y=H*.06+Math.sin(t*Math.PI)*H*.025;
      const col=LIGHT_COLS[i%6];
      const blink=.5+.5*Math.sin(frame*.05+i*.8);
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+9);
      ctx.strokeStyle='rgba(80,40,0,.25)'; ctx.lineWidth=1; ctx.stroke();
      ctx.save(); ctx.globalAlpha=blink*.35;
      ctx.shadowColor=col; ctx.shadowBlur=16;
      ctx.beginPath(); ctx.arc(x,y+13,7,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.restore();
      ctx.save(); ctx.globalAlpha=blink;
      ctx.shadowColor=col; ctx.shadowBlur=7;
      ctx.beginPath(); ctx.arc(x,y+13,4.5,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.restore();
    }
  }

  // Clouds
  const clouds=[{x:.15,y:.13,s:1,spd:.00012},{x:.65,y:.09,s:.7,spd:.00008},{x:.85,y:.16,s:.8,spd:.0001}];
  function drawCloud(x,y,s){
    const r=28*s;
    ctx.save(); ctx.fillStyle='rgba(255,255,255,.65)';
    [[0,0,r],[-.7*r,.3*r,.65*r],[.7*r,.22*r,.7*r],[-.25*r,.52*r,.5*r],[.25*r,.48*r,.52*r]]
      .forEach(([dx,dy,dr])=>{ctx.beginPath();ctx.arc(x+dx,y+dy,dr,0,Math.PI*2);ctx.fill();});
    ctx.restore();
  }

  function drawCenterFade(){
    // soft vignette around edges so it doesn't clash with card
    const g = ctx.createRadialGradient(W/2, H/2, W*.15, W/2, H/2, W*.75);
    g.addColorStop(0, 'rgba(255,248,232,0)');
    g.addColorStop(1, 'rgba(255,248,232,.5)');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // Sky gradient
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#FFF8E8'); sky.addColorStop(.7,'#FFFBEF'); sky.addColorStop(1,'#FFF0D8');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // Ground strip
    const gnd=ctx.createLinearGradient(0,H*.86,0,H);
    gnd.addColorStop(0,'rgba(255,220,150,.15)'); gnd.addColorStop(1,'rgba(255,200,120,.25)');
    ctx.fillStyle=gnd; ctx.fillRect(0,H*.86,W,H*.14);

    clouds.forEach(cl=>{cl.x+=cl.spd;if(cl.x>1.2)cl.x=-.2;drawCloud(cl.x*W,cl.y*H,cl.s);});
    drawLights();
    drawBalloon();
    drawRC();
    drawFerrisWheel();
    drawCenterFade();
    fwRot+=.003; carRot+=.009; frame++;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{resize();});
  resize(); draw();
})();
</script>

<script src="js/authAnimate.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
